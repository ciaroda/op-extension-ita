<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guida PFS/SFS</title>
<link rel="stylesheet" href="sidebar-panel.css">
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="header-copy">
    <div class="header-title">Registrazione Gioco Organizzato</div>
    <div class="header-sub">Guida passo passe per iniziare con la<br/>Pathfinder &amp; Starfinder Society</div>
  </div>
  <button class="close-btn" aria-label="Chiudi">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<div class="site-pill" id="site-pill">
  <div class="site-target">
    <span>Sei su:</span>
    <span class="pill" id="site-name">...</span>
  </div>
  <div class="site-context" id="site-context"></div>
</div>

<div class="interest-wrap">
  <div class="section-label">Mi interessa</div>
  <div class="interest-panel" id="interest-panel"></div>
</div>

<div class="progress-wrap">
  <div class="progress-label" id="prog-label">0 attivita completate</div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<main class="content" id="content"></main>

<div class="help-footer">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="10"/>
    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
    <line x1="12" y1="17" x2="12.01" y2="17"/>
  </svg>
  <span>Supporto</span>
  <a href="https://discord.gg/sA7X8EDbj9" target="_blank" rel="noopener noreferrer">Discord presenza</a>
  <a href="https://discord.gg/CqyMhUtzjn" target="_blank" rel="noopener noreferrer">Discord online</a>
</div>
