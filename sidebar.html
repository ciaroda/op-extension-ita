<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guida PFS/SFS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple:       #534AB7;
    --purple-light: #EEEDFE;
    --purple-dark:  #3C3489;
    --purple-text:  #26215C;
    --green-light:  #EAF3DE;
    --green-dark:   #27500A;
    --teal-light:   #E1F5EE;
    --teal-dark:    #085041;
    --gray-bg:      #F5F5F3;
    --gray-border:  rgba(0,0,0,0.10);
    --text:         #1a1a18;
    --text-sec:     #5f5e5a;
    --text-ter:     #888780;
    --radius:       8px;
    --radius-lg:    12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--gray-border);
    flex-shrink: 0;
  }

  .header-icon {
    width: 30px; height: 30px;
    background: var(--purple-light);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .header-icon svg { width: 16px; height: 16px; stroke: var(--purple-dark); }

  .header-title { font-size: 14px; font-weight: 500; flex: 1; }
  .header-sub   { font-size: 11px; color: var(--text-ter); }

  .close-btn {
    width: 28px; height: 28px;
    border: none; background: none; cursor: pointer;
    color: var(--text-ter); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .close-btn:hover { background: var(--gray-bg); color: var(--text); }
  .close-btn svg { width: 16px; height: 16px; }

  /* Site pill */
  .site-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--gray-border);
    font-size: 12px; color: var(--text-sec);
    flex-shrink: 0;
  }

  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 99px;
    font-size: 11px; font-weight: 500;
    background: var(--purple-light); color: var(--purple-text);
  }

  /* Progress */
  .progress-wrap { padding: 12px 16px 8px; flex-shrink: 0; }
  .progress-label { font-size: 11px; color: var(--text-ter); margin-bottom: 5px; }
  .progress-bar { height: 3px; background: var(--gray-bg); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--purple); border-radius: 99px; transition: width 0.4s; }

  /* Scroll area */
  .content { flex: 1; overflow-y: auto; padding: 0 12px 80px; }

  /* Steps */
  .section-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text-ter); padding: 14px 4px 6px;
  }

  .step {
    border: 0.5px solid var(--gray-border);
    border-radius: var(--radius-lg);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .step.active { border-color: var(--purple); border-width: 1.5px; }

  .step-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; cursor: pointer;
  }

  .step-head:hover { background: var(--gray-bg); }

  .step-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--purple-light); color: var(--purple-dark);
    font-weight: 500; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s;
  }

  .step-num.done { background: var(--green-light); color: var(--green-dark); }

  .step-title { font-size: 13px; font-weight: 500; flex: 1; }

  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 99px;
  }
  .badge-req { background: #FAECE7; color: #712B13; }
  .badge-opt { background: var(--gray-bg); color: var(--text-ter); border: 0.5px solid var(--gray-border); }

  .chev {
    width: 14px; height: 14px; flex-shrink: 0;
    stroke: var(--text-ter); transition: transform 0.2s;
  }
  .chev.open { transform: rotate(180deg); }

  .step-body {
    display: none;
    padding: 0 12px 12px;
    border-top: 0.5px solid var(--gray-border);
  }
  .step-body.visible { display: block; }

  .substep {
    display: flex; gap: 8px; align-items: flex-start;
    margin-top: 10px; font-size: 12px; color: var(--text-sec); line-height: 1.5;
  }

  .snum {
    width: 17px; height: 17px; border-radius: 50%;
    background: var(--gray-bg); font-size: 10px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; color: var(--text-ter);
  }

  .substep strong { color: var(--text); font-weight: 500; }
  .substep code   { background: var(--gray-bg); padding: 1px 4px; border-radius: 3px; font-size: 11px; font-family: monospace; }

  .tip {
    display: flex; gap: 7px; align-items: flex-start;
    margin-top: 10px; padding: 8px 10px;
    background: var(--purple-light); border-radius: var(--radius);
    font-size: 11px; color: var(--purple-text); line-height: 1.5;
  }

  .tip svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; stroke: var(--purple-dark); }

  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

  .btn-link {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 11px; border: 0.5px solid rgba(0,0,0,0.18);
    border-radius: var(--radius); font-size: 11px;
    cursor: pointer; background: var(--gray-bg); color: var(--text);
    text-decoration: none; transition: background 0.15s;
  }
  .btn-link:hover { background: #e8e8e5; }
  .btn-link svg { width: 12px; height: 12px; stroke: currentColor; }

  .btn-done {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 11px; border: 0.5px solid var(--teal-dark);
    border-radius: var(--radius); font-size: 11px;
    cursor: pointer; background: var(--teal-light); color: var(--teal-dark);
    transition: background 0.15s;
  }
  .btn-done:hover { background: #9FE1CB; }
  .btn-done svg { width: 12px; height: 12px; stroke: currentColor; }

  /* Highlight box for current page context */
  .context-box {
    margin: 10px 0 4px;
    padding: 8px 12px;
    background: #FAEEDA; border-radius: var(--radius);
    font-size: 11px; color: #633806;
    display: flex; gap: 7px; align-items: flex-start;
  }

  .context-box svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; stroke: #854F0B; }

  /* Help footer */
  .help-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 12px;
    border-top: 1px solid var(--gray-border);
    background: #fff;
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-sec);
  }

  .help-footer a {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 9px; border: 0.5px solid var(--gray-border);
    border-radius: 99px; font-size: 11px; color: var(--text-sec);
    text-decoration: none; background: var(--gray-bg);
  }

  .help-footer a:hover { background: #e8e8e5; }
  .help-footer svg { width: 12px; height: 12px; stroke: currentColor; }
</style>
</head>
<body>

<div class="header">
